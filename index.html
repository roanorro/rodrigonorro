<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0c">
<title>Scripts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────
   DESIGN TOKENS
   ───────────────────────────────────────────────────────────── */
:root {
  --bg: #0a0a0c;
  --bg-1: #0f0f12;
  --bg-2: #14141a;
  --bg-3: #1a1a21;
  --border: #1f1f26;
  --border-2: #2a2a33;
  --border-strong: #353540;

  --text: #ededee;
  --text-mid: #9b9ba6;
  --text-mute: #5a5a64;
  --text-faint: #3d3d45;

  --accent: #7c7cf0;
  --accent-dim: rgba(124, 124, 240, 0.14);
  --accent-line: rgba(124, 124, 240, 0.35);

  --tag-g: #62c280;
  --tag-g-bg: rgba(98, 194, 128, 0.10);
  --tag-c: #e8a866;
  --tag-c-bg: rgba(232, 168, 102, 0.10);
  --tag-y: #d4be56;
  --tag-y-bg: rgba(212, 190, 86, 0.10);
  --tag-r: #d76e6e;
  --tag-r-bg: rgba(215, 110, 110, 0.10);

  --danger: #d76e6e;
  --success: #62c280;

  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', 'JetBrains Mono', monospace;

  --r-0: 0;
  --r-1: 3px;
  --r-2: 5px;
  --r-3: 8px;

  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

/* ─────────────────────────────────────────────────────────────
   RESET
   ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  overflow: hidden;
  height: 100dvh;
  width: 100vw;
}

body {
  display: flex;
  flex-direction: column;
}

button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
input, textarea { font: inherit; color: inherit; background: none; border: none; outline: none; }
input:focus, textarea:focus { outline: none; }

/* selection */
::selection { background: var(--accent-dim); color: var(--text); }

/* scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

/* ─────────────────────────────────────────────────────────────
   APP SHELL
   ───────────────────────────────────────────────────────────── */
#app {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  overflow: hidden;
}

/* ─────────────────────────────────────────────────────────────
   LOCK SCREEN
   ───────────────────────────────────────────────────────────── */
.lock {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--s-6) var(--s-5);
  position: relative;
  background: var(--bg);
}

.lock-wordmark {
  position: absolute;
  top: max(20px, env(safe-area-inset-top));
  left: var(--s-5);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.lock-wordmark-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.lock-wordmark-rule {
  width: 32px;
  height: 1px;
  background: var(--accent);
  opacity: 0.6;
}

.lock-card {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 0;
  animation: lockIn 0.22s var(--ease);
}

@keyframes lockIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.lock-context {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.lock-context-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.lock-heading {
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.03em;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.2;
}

.lock-sub {
  font-size: 13px;
  color: var(--text-mute);
  margin-bottom: 28px;
  line-height: 1.5;
}

.lock-field {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 12px;
}

.lock-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.lock-input {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--border-2);
  padding: 14px var(--s-4);
  font-family: var(--font-mono);
  font-size: 18px;
  letter-spacing: 0.12em;
  border-radius: var(--r-2);
  color: var(--text);
  transition: border-color 0.14s var(--ease), box-shadow 0.14s var(--ease);
  caret-color: var(--accent);
}

.lock-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(124,124,240,0.1);
  outline: none;
}

.lock-input::placeholder { color: var(--text-faint); letter-spacing: 0.08em; }

.lock-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  padding: 14px var(--s-4);
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 0.03em;
  border-radius: var(--r-2);
  border: none;
  cursor: pointer;
  transition: opacity 0.12s var(--ease), transform 0.1s var(--ease);
  margin-top: 16px;
}

.lock-btn:active { opacity: 0.88; transform: scale(0.99); }
.lock-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

.lock-link {
  font-size: 12px;
  color: var(--text-mute);
  text-align: center;
  margin-top: 16px;
  cursor: pointer;
  transition: color 0.12s var(--ease);
  letter-spacing: -0.002em;
}
.lock-link:hover { color: var(--text-mid); }

.lock-error {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--danger);
  letter-spacing: 0.04em;
  min-height: 14px;
  margin-top: 10px;
}

/* ─────────────────────────────────────────────────────────────
   TOP BAR (shared across workspace/reading)
   ───────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  height: 44px;
  padding: 0 var(--s-3);
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: relative;
  z-index: 10;
  gap: var(--s-2);
  padding-top: env(safe-area-inset-top);
  height: calc(44px + env(safe-area-inset-top));
  flex-shrink: 0;
}

.topbar-section {
  display: flex;
  align-items: center;
  gap: var(--s-2);
}

.topbar-section.grow { flex: 1; min-width: 0; }

.tb-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 30px;
  min-width: 30px;
  padding: 0 var(--s-2);
  font-size: 12px;
  color: var(--text-mid);
  border-radius: var(--r-2);
  transition: color 0.1s var(--ease), background 0.1s var(--ease);
  gap: 6px;
}

.tb-btn:hover { color: var(--text); background: var(--bg-2); }
.tb-btn:active { background: var(--bg-3); }
.tb-btn[data-active="true"] { color: var(--text); background: var(--bg-2); }
.tb-btn .kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-1);
  letter-spacing: 0.02em;
}

.tb-title {
  font-weight: 500;
  font-size: 13px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.005em;
}

.tb-sep { width: 1px; height: 18px; background: var(--border); margin: 0 var(--s-1); }

/* search-style trigger that opens palette */
.tb-search {
  display: flex;
  align-items: center;
  gap: var(--s-2);
  padding: 0 var(--s-3);
  height: 30px;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-2);
  color: var(--text-mute);
  font-size: 12px;
  flex: 1;
  max-width: 360px;
  cursor: pointer;
  transition: border-color 0.1s var(--ease);
}
.tb-search:hover { border-color: var(--border-2); color: var(--text-mid); }
.tb-search-icon { color: var(--text-faint); flex-shrink: 0; }
.tb-search-text { flex: 1; }

/* ─────────────────────────────────────────────────────────────
   WORKSPACE
   ───────────────────────────────────────────────────────────── */
.workspace {
  flex: 1;
  display: flex;
  min-height: 0;
  position: relative;
}

.sidebar {
  width: 260px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  background: var(--bg);
  min-height: 0;
}

.sb-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--s-3) var(--s-4) var(--s-2);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.sb-count { font-variant-numeric: tabular-nums; }

.sb-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 var(--s-2) var(--s-3);
}

.sb-item {
  display: flex;
  align-items: center;
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-2);
  cursor: pointer;
  color: var(--text-mid);
  font-size: 13px;
  gap: var(--s-2);
  transition: background 0.1s var(--ease), color 0.1s var(--ease);
  position: relative;
}

.sb-item:hover { background: var(--bg-2); color: var(--text); }
.sb-item[aria-selected="true"] {
  background: var(--bg-2);
  color: var(--text);
}
.sb-item[aria-selected="true"]::before {
  content: '';
  position: absolute;
  left: -2px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
}

.sb-item-title {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-weight: 400;
}

.sb-item-slug {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.02em;
}

.sb-new {
  margin: 0 var(--s-2) var(--s-3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--s-2) var(--s-3);
  border-radius: var(--r-2);
  font-size: 13px;
  color: var(--text-mid);
  border: 1px dashed var(--border-2);
  cursor: pointer;
  transition: border-color 0.1s var(--ease), color 0.1s var(--ease);
}
.sb-new:hover { color: var(--text); border-color: var(--border-strong); }
.sb-new .kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  padding: 1px 5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-1);
}

.sb-empty {
  padding: var(--s-5) var(--s-4);
  text-align: center;
  color: var(--text-mute);
  font-size: 12px;
}

/* Sidebar footer with user actions */
.sb-foot {
  border-top: 1px solid var(--border);
  padding: var(--s-2);
  display: flex;
  gap: var(--s-1);
}
.sb-foot .tb-btn {
  flex: 1;
  justify-content: center;
  font-size: 11px;
  height: 28px;
}

/* ─────────────────────────────────────────────────────────────
   EDITOR
   ───────────────────────────────────────────────────────────── */
.editor {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  min-height: 0;
  background: var(--bg);
}

.editor-head {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  padding: var(--s-3) var(--s-4);
  border-bottom: 1px solid var(--border);
}

.editor-title {
  flex: 1;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  padding: 4px 0;
  min-width: 0;
}
.editor-title::placeholder { color: var(--text-mute); }

.editor-slug {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-mid);
  background: var(--bg-2);
  padding: 4px 10px;
  border-radius: var(--r-2);
  letter-spacing: 0.02em;
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}
.editor-slug-input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font: inherit;
  width: 120px;
  letter-spacing: inherit;
}
.editor-slug-prefix { color: var(--text-faint); }

.editor-actions { display: flex; gap: var(--s-1); align-items: center; }

.editor-meta {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Color toolbar */
.color-toolbar {
  display: flex;
  align-items: center;
  gap: var(--s-1);
  padding: var(--s-2) var(--s-4);
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-faint);
}

.ct-label { margin-right: var(--s-2); }

.ct-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--r-2);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  cursor: pointer;
  border: 1px solid transparent;
  transition: border-color 0.1s var(--ease), background 0.1s var(--ease);
  text-transform: lowercase;
}
.ct-tag:hover { background: var(--bg-2); }
.ct-tag .dot { width: 8px; height: 8px; border-radius: 2px; }
.ct-tag[data-c="g"] { color: var(--tag-g); }
.ct-tag[data-c="g"] .dot { background: var(--tag-g); }
.ct-tag[data-c="c"] { color: var(--tag-c); }
.ct-tag[data-c="c"] .dot { background: var(--tag-c); }
.ct-tag[data-c="y"] { color: var(--tag-y); }
.ct-tag[data-c="y"] .dot { background: var(--tag-y); }
.ct-tag[data-c="r"] { color: var(--tag-r); }
.ct-tag[data-c="r"] .dot { background: var(--tag-r); }
.ct-tag .kbd {
  font-size: 9px;
  color: var(--text-faint);
  padding: 1px 4px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: var(--bg-1);
  margin-left: 4px;
}

.ct-divider { width: 1px; height: 18px; background: var(--border); margin: 0 var(--s-2); }

.ct-heading {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--r-2);
  color: var(--text-mid);
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: lowercase;
  transition: color 0.1s var(--ease), background 0.1s var(--ease);
}
.ct-heading:hover { background: var(--bg-2); color: var(--text); }
.ct-heading .hash { color: var(--accent); font-weight: 500; }

/* Editor body — split */
.editor-body {
  flex: 1;
  display: flex;
  min-height: 0;
  position: relative;
}

.editor-textarea {
  flex: 1;
  padding: var(--s-5) var(--s-6);
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.65;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  resize: none;
  letter-spacing: 0.005em;
  overflow-y: auto;
  -webkit-text-fill-color: var(--text);
  caret-color: var(--accent);
}

.editor-preview {
  flex: 1;
  padding: var(--s-5) var(--s-6);
  overflow-y: auto;
  font-size: 15px;
  line-height: 1.7;
  border-left: 1px solid var(--border);
  background: var(--bg-1);
}

.editor-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--s-7);
  color: var(--text-mute);
  text-align: center;
  gap: var(--s-3);
}
.editor-empty-mark {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.editor-empty-title {
  font-size: 18px;
  color: var(--text-mid);
  font-weight: 400;
  letter-spacing: -0.01em;
}
.editor-empty-hint {
  font-size: 12px;
  color: var(--text-mute);
  display: flex;
  align-items: center;
  gap: 6px;
}
.editor-empty-hint .kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--bg-1);
  color: var(--text-mid);
}

/* ─────────────────────────────────────────────────────────────
   READING MODE
   ───────────────────────────────────────────────────────────── */
.reading {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--bg);
}

.reading-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  flex-shrink: 0;
  position: relative;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  padding-top: env(safe-area-inset-top);
  height: calc(50px + env(safe-area-inset-top));
}

.rb-back {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mid);
  flex-shrink: 0;
  border-radius: var(--r-2);
  transition: color 0.1s var(--ease), background 0.1s var(--ease);
}
.rb-back:hover { color: var(--text); background: var(--bg-2); }

/* SECTION NAV — dominant element */
.sec-nav {
  flex: 1;
  position: relative;
  min-width: 0;
}

.sec-nav-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  height: 36px;
  padding: 0 10px;
  border-radius: var(--r-2);
  border: 1px solid var(--border);
  background: var(--bg-2);
  cursor: pointer;
  transition: border-color 0.12s var(--ease);
  min-width: 0;
}
.sec-nav-trigger:hover { border-color: var(--border-strong); }
.sec-nav-trigger.open { border-color: var(--accent); }

.sec-nav-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--nc, var(--text-faint));
  transition: background 0.15s var(--ease);
}

.sec-nav-label {
  flex: 1;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.005em;
  text-align: left;
}

.sec-nav-sub-hint {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

.sec-nav-caret {
  color: var(--text-faint);
  font-size: 9px;
  flex-shrink: 0;
  transition: transform 0.15s var(--ease);
}
.sec-nav-trigger.open .sec-nav-caret { transform: rotate(180deg); }

.sec-nav-menu {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--bg-2);
  border: 1px solid var(--border-2);
  border-radius: var(--r-3);
  z-index: 60;
  max-height: calc(100dvh - 80px);
  overflow-y: auto;

/* ═════════════════════════════════════════════════════════════
   UTILS
   ═════════════════════════════════════════════════════════════ */
const $ = (s, root = document) => root.querySelector(s);
const $$ = (s, root = document) => Array.from(root.querySelectorAll(s));

function el(tag, props = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(props)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k === 'text') e.textContent = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if (k === 'data') for (const [dk, dv] of Object.entries(v)) e.dataset[dk] = dv;
    else if (k === 'attrs') for (const [ak, av] of Object.entries(v)) e.setAttribute(ak, av);
    else e[k] = v;
  }
  for (const c of children.flat()) {
    if (c == null) continue;
    if (typeof c === 'string' || typeof c === 'number') e.appendChild(document.createTextNode(c));
    else if (c instanceof Node) e.appendChild(c);
  }
  return e;
}

function toast(msg, ms = 2200) {
  const t = $('#toast');
  t.textContent = msg;
  t.hidden = false;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toast._t);
  toast._t = setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => { t.hidden = true; }, 300);
  }, ms);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function slugify(s) {
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '').slice(0, 60);
}

function fmtTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const ss = (s % 60).toString().padStart(2, '0');
  return `${m}:${ss}`;
}

function relTime(ts) {
  if (!ts) return '';
  const d = Date.now() - ts;
  if (d < 60000) return 'ahora';
  if (d < 3600000) return Math.floor(d / 60000) + 'm';
  if (d < 86400000) return Math.floor(d / 3600000) + 'h';
  if (d < 7 * 86400000) return Math.floor(d / 86400000) + 'd';
  const date = new Date(ts);
  return `${date.getDate()} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][date.getMonth()]}`;
}

/* ═════════════════════════════════════════════════════════════
   CRYPTO · compatible con tu app actual
   master_hash = SHA-256(password + SALT + 'gate')
   AES-GCM payload = b64url(salt[16] || iv[12] || ciphertext)
   ═════════════════════════════════════════════════════════════ */
const enc = new TextEncoder();
const dec = new TextDecoder();

async function sha256Hex(text) {
  const buf = await crypto.subtle.digest('SHA-256', enc.encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function hashMaster(password) {
  return sha256Hex(password + SALT + 'gate');
}

async function deriveKey(password, saltBytes) {
  const baseKey = await crypto.subtle.importKey(
    'raw', enc.encode(password),
    { name: 'PBKDF2' }, false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: saltBytes, iterations: PBKDF2_ITER, hash: 'SHA-256' },
    baseKey,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

function b64UrlEncode(u8) {
  let bin = '';
  for (let i = 0; i < u8.length; i++) bin += String.fromCharCode(u8[i]);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function b64UrlDecode(s) {
  s = String(s).replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  const bin = atob(s);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}

async function encryptWith(text, password) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await deriveKey(password, salt);
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
  const out = new Uint8Array(16 + 12 + ct.byteLength);
  out.set(salt, 0);
  out.set(iv, 16);
  out.set(new Uint8Array(ct), 28);
  return b64UrlEncode(out);
}

async function decryptWith(b64, password) {
  if (!b64) return '';
  const bytes = b64UrlDecode(b64);
  const salt = bytes.slice(0, 16);
  const iv = bytes.slice(16, 28);
  const ct = bytes.slice(28);
  const key = await deriveKey(password, salt);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return dec.decode(pt);
}

/* ═════════════════════════════════════════════════════════════
   SUPABASE
   ═════════════════════════════════════════════════════════════ */
async function sb(method, path, body) {
  const opts = {
    method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    }
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(SB_URL + '/rest/v1' + path, opts);
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`Supabase ${r.status}: ${txt}`);
  }
  if (r.status === 204) return null;
  const ct = r.headers.get('content-type') || '';
  if (!ct.includes('application/json')) return null;
  return r.json();
}

const api = {
  async getConfig(key) {
    const rows = await sb('GET', `/config?key=eq.${encodeURIComponent(key)}&select=val`);
    return rows && rows[0] ? rows[0].val : null;
  },
  async setConfig(key, val) {
    return sb('POST', `/config?on_conflict=key`, { key, val })
      .catch(async () => sb('PATCH', `/config?key=eq.${encodeURIComponent(key)}`, { val }));
  },
  async listScripts() {
    return sb('GET', `/scripts?select=slug,tn,p,s,cr,up&order=up.desc`);
  },
  async getScript(slug) {
    const rows = await sb('GET', `/scripts?slug=eq.${encodeURIComponent(slug)}&select=*`);
    return rows && rows[0] ? rows[0] : null;
  },
  async createScript(row) {
    return sb('POST', `/scripts`, row);
  },
  async updateScript(slug, patch) {
    return sb('PATCH', `/scripts?slug=eq.${encodeURIComponent(slug)}`, patch);
  },
  async deleteScript(slug) {
    return sb('DELETE', `/scripts?slug=eq.${encodeURIComponent(slug)}`);
  }
};

/* ═════════════════════════════════════════════════════════════
   PARSING & RENDERING SCRIPT CONTENT
   ═════════════════════════════════════════════════════════════ */
function parseScript(content) {
  // Returns {flat, tree}
  // flat: [{title, idx, level, parentIdx, color}]
  // tree: [{...h1Section, color, children:[{...h2Section, color}]}]
  const rawLines = (content || '').split(/\r?\n/);
  const allSections = [];
  let current = null;
  let sIdx = 0;

  const startSection = (title, level) => {
    if (current) allSections.push(current);
    current = { title, idx: sIdx++, level, lines: [] };
  };

  current = { title: '', idx: sIdx++, level: 1, lines: [] };

  for (const ln of rawLines) {
    if (/^##\s+(.+)$/.test(ln)) {
      startSection(ln.replace(/^##\s+/, '').trim(), 2);
    } else if (/^#\s+(.+)$/.test(ln)) {
      startSection(ln.replace(/^#\s+/, '').trim(), 1);
    } else if (ln.trim() === '') {
      current.lines.push({ type: 'empty' });
    } else if (/^-{3,}\s*$|^={3,}\s*$/.test(ln.trim())) {
      current.lines.push({ type: 'separator' });
    } else if (/^(→|-|•)\s+(.+)$/.test(ln)) {
      current.lines.push({ type: 'bullet', content: ln.replace(/^(→|-|•)\s+/, '') });
    } else {
      current.lines.push({ type: 'text', content: ln });
    }
  }
  if (current) allSections.push(current);

  // Assign colors to H1s, propagate to children
  const tree = [];
  let colorIdx = 0;
  let lastH1 = null;

  for (const s of allSections) {
    if (s.level === 1) {
      s.color = SEC_COLORS[colorIdx % SEC_COLORS.length];
      colorIdx++;
      s.children = [];
      s.parentIdx = null;
      tree.push(s);
      lastH1 = s;
    } else {
      // H2 subsection
      if (lastH1) {
        s.color = lastH1.color;
        s.parentIdx = lastH1.idx;
        lastH1.children.push(s);
      } else {
        s.color = SEC_COLORS[0];
        s.children = [];
        s.parentIdx = null;
        tree.push(s);
        lastH1 = s;
      }
    }
  }

  return { flat: allSections, tree };
}

function renderColorTags(text) {
  let html = escapeHtml(text);
  html = html.replace(/\{g\}([\s\S]*?)\{\/?g\}/g, '<span class="tag tag-g">$1</span>');
  html = html.replace(/\{c\}([\s\S]*?)\{\/?c\}/g, '<span class="tag tag-c">$1</span>');
  html = html.replace(/\{y\}([\s\S]*?)\{\/?y\}/g, '<span class="tag tag-y">$1</span>');
  html = html.replace(/\{r\}([\s\S]*?)\{\/?r\}/g, '<span class="tag tag-r">$1</span>');
  return html;
}

function highlightSearch(html, query) {
  if (!query || !query.trim()) return html;
  try {
    const re = new RegExp('(' + query.trim().replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    const tmp = document.createElement('div');
    tmp.innerHTML = html;
    const walker = document.createTreeWalker(tmp, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = walker.nextNode())) nodes.push(n);
    let matches = 0;
    for (const tn of nodes) {
      const v = tn.nodeValue;
      if (re.test(v)) {
        re.lastIndex = 0;
        const frag = document.createDocumentFragment();
        let last = 0;
        v.replace(re, (m, _g, i) => {
          if (i > last) frag.appendChild(document.createTextNode(v.slice(last, i)));
          const mk = document.createElement('mark');
          mk.textContent = m;
          frag.appendChild(mk);
          matches++;
          last = i + m.length;
          return m;
        });
        if (last < v.length) frag.appendChild(document.createTextNode(v.slice(last)));
        tn.parentNode.replaceChild(frag, tn);
        re.lastIndex = 0;
      }
    }
    state.searchInScript.count = matches;
    return tmp.innerHTML;
  } catch (e) {
    return html;
  }
}

function renderScriptHtml(content, query = '') {
  state.searchInScript.count = 0;
  const { flat, tree } = parseScript(content);
  const parts = [];

  for (const s of flat) {
    const color = s.color || 'var(--border)';
    if (s.level === 1 && s.title) {
      parts.push(`<h1 id="sec-${s.idx}" style="--sc:${color}">${escapeHtml(s.title)}</h1>`);
    } else if (s.level === 2 && s.title) {
      parts.push(`<h2 id="sec-${s.idx}" style="--sc:${color}">${escapeHtml(s.title)}</h2>`);
    }
    for (const ln of s.lines) {
      if (ln.type === 'empty') {
        parts.push('<div class="rl-gap"></div>');
      } else if (ln.type === 'separator') {
        parts.push('<hr class="rl-sep">');
      } else if (ln.type === 'bullet') {
        parts.push(`<div class="rl-bullet"><span class="rl-bullet-mark">→</span><span>${renderColorTags(ln.content)}</span></div>`);
      } else {
        parts.push(`<p class="rl-text">${renderColorTags(ln.content)}</p>`);
      }
    }
  }

  let html = parts.join('');
  if (query && query.trim()) html = highlightSearch(html, query);

  return { html, flat, tree };
}

/* ═════════════════════════════════════════════════════════════
   AUTH FLOW
   ═════════════════════════════════════════════════════════════ */
async function unlock(password) {
  const hash = await hashMaster(password);
  const stored = await api.getConfig('master_hash');

  if (!stored) {
    // First-time setup: set the master hash
    await api.setConfig('master_hash', hash);
    state.master = password;
    return true;
  }

  if (hash !== stored) return false;

  state.master = password;
  return true;
}

async function loadAllScripts() {
  const rows = await api.listScripts();
  // Decrypt in parallel for speed
  await Promise.all(rows.map(async row => {
    try {
      row._content = await decryptWith(row.p, state.master);
    } catch (e) {
      row._content = '';
      console.warn('Failed to decrypt', row.slug, e.message);
    }
  }));
  state.scripts = rows;
}

async function unlockShared(slug, password) {
  const row = await api.getScript(slug);
  if (!row || !row.s) return null;
  try {
    const payload = await decryptWith(row.s, password);
    const data = JSON.parse(payload);
    return { ...row, _content: data.content, _title: data.title || row.tn };
  } catch (e) {
    return null;
  }
}

const QUICK_ACTIONS = [
  { id: 'new', title: 'Nuevo script', icon: '+', shortcut: '⌘N', action: () => createNewScript() },
  { id: 'reading', title: 'Modo lectura', icon: '◐', shortcut: '⌘R', action: () => {
    if (state.currentSlug) location.hash = state.currentSlug;
  }},
  { id: 'workspace', title: 'Workspace', icon: '⊞', action: () => {
    location.hash = '';
  }},
  { id: 'scratch', title: 'Scratchpad', icon: '✎', shortcut: '⌘.', action: () => toggleScratch() },
  { id: 'share', title: 'Compartir script actual con enlace', icon: '↗', action: () => state.currentSlug && openShareModal() },
  { id: 'delete', title: 'Borrar script actual', icon: '×', action: () => state.currentSlug && confirmDelete() },
  { id: 'lock', title: 'Bloquear app', icon: '⊠', shortcut: '⌘L', action: () => lockApp() },
];

function fuzzyMatch(needle, hay) {
  needle = needle.toLowerCase();
  hay = hay.toLowerCase();
  if (!needle) return { score: 0, indices: [] };
  let hi = 0, ni = 0;
  const indices = [];
  let score = 0;
  let prev = -2;
  while (ni < needle.length && hi < hay.length) {
    if (hay[hi] === needle[ni]) {
      indices.push(hi);
      score += (hi === prev + 1) ? 6 : 1;
      if (hi === 0) score += 4;
      prev = hi;
      ni++;
    }
    hi++;
  }
  if (ni < needle.length) return null;
  return { score, indices };
}

function highlightMatch(text, indices) {
  if (!indices || !indices.length) return escapeHtml(text);
  let out = '';
  let last = 0;
  const set = new Set(indices);
  for (let i = 0; i < text.length; i++) {
    if (set.has(i)) {
      if (last < i) out += escapeHtml(text.slice(last, i));
      out += `<mark class="fuz">${escapeHtml(text[i])}</mark>`;
      last = i + 1;
    }
  }
  if (last < text.length) out += escapeHtml(text.slice(last));
  return out;
}

function paletteSearch(q) {
  q = q.trim();
  const items = [];
  let scriptResults = [];
  if (q) {
    for (const s of state.scripts) {
      const m1 = fuzzyMatch(q, s.tn || '');
      const m2 = fuzzyMatch(q, s.slug || '');
      if (m1 || m2) {
        scriptResults.push({
          type: 'script',
          slug: s.slug,
          title: s.tn,
          titleHtml: m1 ? highlightMatch(s.tn || '', m1.indices) : escapeHtml(s.tn || ''),
          slugHtml: m2 ? highlightMatch(s.slug, m2.indices) : escapeHtml(s.slug),
          score: Math.max(m1 ? m1.score : 0, m2 ? m2.score : 0) * 1.5
        });
      }
    }
    scriptResults.sort((a, b) => b.score - a.score);
  } else {
    scriptResults = state.scripts.slice(0, 8).map(s => ({
      type: 'script',
      slug: s.slug,
      title: s.tn,
      titleHtml: escapeHtml(s.tn || '(sin título)'),
      slugHtml: escapeHtml(s.slug),
    }));
  }
  if (scriptResults.length) items.push({ section: 'Scripts' }, ...scriptResults);

  // Actions
  let actionResults = [];
  if (q) {
    for (const a of QUICK_ACTIONS) {
      const m = fuzzyMatch(q, a.title);
      if (m) actionResults.push({ ...a, type: 'action', titleHtml: highlightMatch(a.title, m.indices), score: m.score });
    }
    actionResults.sort((a, b) => b.score - a.score);
  } else {
    actionResults = QUICK_ACTIONS.map(a => ({ ...a, type: 'action', titleHtml: escapeHtml(a.title) }));
  }
  if (actionResults.length) items.push({ section: 'Acciones' }, ...actionResults);

  state.palette.items = items;
  state.palette.selected = items.findIndex(i => !i.section);
  if (state.palette.selected < 0) state.palette.selected = 0;
  renderPalette();
}

function renderPalette() {
  const results = $('#palette-results');
  results.innerHTML = '';
  if (!state.palette.items.length) {
    results.appendChild(el('div', { class: 'pal-empty', text: 'Nada encontrado.' }));
    return;
  }
  state.palette.items.forEach((it, idx) => {
    if (it.section) {
      results.appendChild(el('div', { class: 'pal-section', text: it.section }));
      return;
    }
    const selected = idx === state.palette.selected;
    const item = el('div', {
      class: 'pal-item',
      attrs: { 'aria-selected': selected ? 'true' : 'false' },
      data: { idx: String(idx) },
      onmouseenter: () => { state.palette.selected = idx; renderPalette(); },
      onclick: () => activatePaletteItem(idx)
    },
      el('span', { class: 'pal-item-icon', text: it.type === 'script' ? '/' : (it.icon || '·') }),
      el('span', { class: 'pal-item-text' },
        el('span', { class: 'pal-item-title', html: it.titleHtml }),
        it.type === 'script' ? el('span', { class: 'pal-item-slug', html: '#' + it.slugHtml }) : null
      ),
      it.shortcut ? el('span', { class: 'pal-shortcut', text: it.shortcut }) : null
    );
    results.appendChild(item);
  });
  // scroll selected into view
  const sel = $(`.pal-item[data-idx="${state.palette.selected}"]`);
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

function activatePaletteItem(idx) {
  const item = state.palette.items[idx];
  if (!item || item.section) return;
  closePalette();
  if (item.type === 'script') openScript(item.slug);
  else if (item.type === 'action' && item.action) item.action();
}

function openPalette() {
  if (state.mode === 'locked' || state.mode === 'shared-locked') return;
  $('#palette').hidden = false;
  state.palette.open = true;
  const input = $('#palette-input');
  input.value = '';
  paletteSearch('');
  setTimeout(() => input.focus(), 30);
}

function closePalette() {
  $('#palette').hidden = true;
  state.palette.open = false;
}

/* ═════════════════════════════════════════════════════════════
   RENDER · LOCK
   ═════════════════════════════════════════════════════════════ */
function renderLock(opts = {}) {
  const isShared = opts.shared;
  const slug = opts.slug;
  const app = $('#app');
  app.innerHTML = '';

  const wrap = el('div', { class: 'lock' });

  // Wordmark top-left
  const wm = el('div', { class: 'lock-wordmark' });
  wm.appendChild(el('div', { class: 'lock-wordmark-label', text: 'SCRIPTS' }));
  wm.appendChild(el('div', { class: 'lock-wordmark-rule' }));
  wrap.appendChild(wm);

  const card = el('div', { class: 'lock-card' });

  if (isShared) {
    // Context: show the slug being accessed
    const ctx = el('div', { class: 'lock-context' });
    ctx.appendChild(el('span', { class: 'lock-context-dot' }));
    ctx.appendChild(el('span', { text: '#' + slug }));
    card.appendChild(ctx);
    card.appendChild(el('div', { class: 'lock-heading', text: 'Script protegido' }));
    card.appendChild(el('div', { class: 'lock-sub', text: 'Ingresá la contraseña del enlace para leer este script.' }));
  } else {
    const hasHash = opts.hasHash;
    if (!hasHash) {
      card.appendChild(el('div', { class: 'lock-heading', text: 'Primera vez' }));
      card.appendChild(el('div', { class: 'lock-sub', text: 'Elegí una contraseña maestra. No se puede recuperar — guardala bien.' }));
    } else {
      card.appendChild(el('div', { class: 'lock-heading', text: 'Scripts' }));
    }
  }

  const field = el('div', { class: 'lock-field' });
  field.appendChild(el('div', {
    class: 'lock-label',
    text: isShared ? 'Contraseña del enlace' : (opts.hasHash ? 'Contraseña maestra' : 'Nueva contraseña maestra')
  }));
  const input = el('input', {
    class: 'lock-input',
    type: 'password',
    autocomplete: isShared ? 'off' : 'current-password',
    placeholder: '••••••••',
    attrs: { autofocus: 'true' }
  });
  field.appendChild(input);
  card.appendChild(field);

  const errEl = el('div', { class: 'lock-error', text: opts.error || '' });
  const btnLabel = isShared ? 'Abrir script' : (opts.hasHash ? 'Entrar' : 'Crear acceso');
  const btn = el('button', { class: 'lock-btn', text: btnLabel });

  const submit = async () => {
    const pwd = input.value;
    if (!pwd) { input.focus(); return; }
    btn.disabled = true;
    btn.textContent = '···';
    errEl.textContent = '';
    try {
      if (isShared) {
        const result = await unlockShared(slug, pwd);
        if (!result) {
          errEl.textContent = 'Contraseña incorrecta';
          btn.disabled = false;
          btn.textContent = btnLabel;
          input.select();
          return;
        }
        state.mode = 'shared';
        state.currentSlug = slug;
        state._sharedScript = result;
        renderShared(result);
      } else {
        const ok = await unlock(pwd);
        if (!ok) {
          errEl.textContent = 'Contraseña incorrecta';
          btn.disabled = false;
          btn.textContent = btnLabel;
          input.select();
          return;
        }
        await loadAllScripts();
        state.mode = 'workspace';
        renderApp();
      }
    } catch (e) {
      console.error(e);
      errEl.textContent = e.message.includes('fetch')
        ? 'Sin conexión — el proyecto Supabase puede estar pausado'
        : 'Error: ' + e.message;
      btn.disabled = false;
      btn.textContent = btnLabel;
    }
  };

  input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  btn.addEventListener('click', submit);

  card.appendChild(btn);
  card.appendChild(errEl);

  if (isShared) {
    const switchLink = el('div', { class: 'lock-link', text: 'Tengo la contraseña maestra →' });
    switchLink.addEventListener('click', () => { location.hash = ''; renderLock({ hasHash: true }); });
    card.appendChild(switchLink);
  }

  wrap.appendChild(card);
  app.appendChild(wrap);
  setTimeout(() => input.focus(), 40);
}

/* ═════════════════════════════════════════════════════════════
   RENDER · WORKSPACE
   ═════════════════════════════════════════════════════════════ */
function renderApp() {
  const hash = location.hash.replace(/^#/, '');
  if (hash) {
    // Reading mode
    const script = state.scripts.find(s => s.slug === hash);
    if (script) {
      state.currentSlug = hash;
      renderReading(script);
      return;
    }
  }
  state.mode = 'workspace';
  state.currentSlug = state.currentSlug || (state.scripts[0] && state.scripts[0].slug) || null;
  renderWorkspace();
}

function renderWorkspace() {
  const app = $('#app');
  app.innerHTML = '';

  // Top bar
  const tb = el('div', { class: 'topbar' });
  tb.appendChild(el('button', {
    class: 'tb-btn',
    onclick: () => { state.sidebarOpen = !state.sidebarOpen; $('.workspace').dataset.sidebar = state.sidebarOpen ? 'true' : 'false'; $('.sidebar').dataset.open = state.sidebarOpen ? 'true' : 'false'; },
    html: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4h10M2 7h10M2 10h10"/></svg>'
  }));

  tb.appendChild(el('span', { class: 'tb-title', text: 'Scripts' }));

  const grow = el('div', { class: 'topbar-section grow' });

    onclick: openPalette
  },
    el('span', { class: 'tb-search-icon', html: '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="5" cy="5" r="3"/><path d="m8 8 3 3"/></svg>' }),
    el('span', { class: 'tb-search-text', text: 'Buscar · ejecutar' }),
    el('kbd', { class: 'kbd', text: '/' })
  );
  grow.appendChild(search);
  tb.appendChild(grow);

  tb.appendChild(el('button', { class: 'tb-btn', onclick: toggleScratch, attrs: { title: 'Scratchpad' }, html: '✎' }));

  app.appendChild(tb);

  // Workspace
  const ws = el('div', { class: 'workspace', data: { sidebar: state.sidebarOpen ? 'true' : 'false' } });

  // Sidebar
  const sb = el('aside', { class: 'sidebar', data: { open: state.sidebarOpen ? 'true' : 'false' } });
  const sbHead = el('div', { class: 'sb-head' },
    el('span', { text: 'Scripts' }),
    el('span', { class: 'sb-count', text: String(state.scripts.length).padStart(2, '0') })
  );
  sb.appendChild(sbHead);

  const sbList = el('div', { class: 'sb-list' });
  if (state.scripts.length === 0) {
    sbList.appendChild(el('div', { class: 'sb-empty', text: 'Sin scripts. Creá el primero.' }));
  } else {
    for (const s of state.scripts) {
      const item = el('div', {
        class: 'sb-item',
        attrs: { 'aria-selected': s.slug === state.currentSlug ? 'true' : 'false' },
        onclick: () => { state.currentSlug = s.slug; state.sidebarOpen = false; renderWorkspace(); }
      },
        el('span', { class: 'sb-item-title', text: s.tn || '(sin título)' }),
        el('span', { class: 'sb-item-slug', text: relTime(s.up) })
      );
      sbList.appendChild(item);
    }
  }
  sb.appendChild(sbList);

  sb.appendChild(el('button', {
    class: 'sb-new',
    onclick: createNewScript,
    attrs: { title: 'Nuevo script' }
  },
    el('span', { text: '+ Nuevo' }),
    el('span', { class: 'kbd', text: '⌘N' })
  ));

  // Sidebar footer
  const sbFoot = el('div', { class: 'sb-foot' },
    el('button', { class: 'tb-btn', onclick: lockApp, text: 'Bloquear' })
  );
  sb.appendChild(sbFoot);

  ws.appendChild(sb);

  // Editor or empty
  const current = state.scripts.find(s => s.slug === state.currentSlug);
  if (current) {
    ws.appendChild(renderEditor(current));
  } else {
    ws.appendChild(renderEditorEmpty());
  }

  app.appendChild(ws);
}

function renderEditorEmpty() {
  return el('div', { class: 'editor' },
    el('div', { class: 'editor-empty' },
      el('div', { class: 'editor-empty-mark', text: 'WORKSPACE' }),
      el('div', { class: 'editor-empty-title', text: 'Ningún script abierto' }),
      el('div', { class: 'editor-empty-hint' },
        el('span', { text: 'Abrí la paleta con' }),
        el('kbd', { class: 'kbd', text: '/' }),
        el('span', { text: ' o creá uno nuevo con' }),
        el('kbd', { class: 'kbd', text: '⌘N' })
      )
    )
  );
}

function renderEditor(script) {
  const editor = el('div', { class: 'editor' });

  // Head
  const head = el('div', { class: 'editor-head' });
  const titleInput = el('input', {
    class: 'editor-title',
    type: 'text',
    value: script.tn || '',
    placeholder: 'Título del script',
    oninput: e => { script.tn = e.target.value; scheduleSave(script); }
  });
  head.appendChild(titleInput);

  // Slug pill
  const slugBox = el('div', { class: 'editor-slug' },
    el('span', { class: 'editor-slug-prefix', text: '#' }),
    el('input', {
      class: 'editor-slug-input',
      type: 'text',
      value: script.slug,
      placeholder: 'slug',
      oninput: e => { e.target.value = slugify(e.target.value); },
      onchange: async e => {
        const newSlug = slugify(e.target.value);
        if (!newSlug || newSlug === script.slug) { e.target.value = script.slug; return; }
        if (state.scripts.find(s => s.slug === newSlug)) { toast('Ese slug ya existe'); e.target.value = script.slug; return; }
        try {
          // Insert new, delete old. Preserve share payload (s).
          const encContent = await encryptWith(script._content || '', state.master);
          const now = Date.now();
          const row = { slug: newSlug, tn: script.tn || '', p: encContent, cr: script.cr, up: now };
          if (script.s) row.s = script.s;
          await api.createScript(row);
          await api.deleteScript(script.slug);
          script.slug = newSlug;
          script.up = now;
          state.currentSlug = newSlug;
          toast('Slug actualizado');
        } catch (err) { toast('Error al cambiar slug'); console.error(err); }
      }
    })
  );
  head.appendChild(slugBox);

  // Actions
  const actions = el('div', { class: 'editor-actions' });
  actions.appendChild(el('span', { class: 'editor-meta', text: relTime(script.up) }));
  actions.appendChild(el('button', { class: 'tb-btn', onclick: () => { location.hash = script.slug; }, text: 'Leer' }));
  actions.appendChild(el('button', { class: 'tb-btn', onclick: openShareModal, text: 'Compartir' }));
  actions.appendChild(el('button', { class: 'tb-btn btn-danger', onclick: confirmDelete, attrs: { title: 'Borrar' }, html: '×' }));
  head.appendChild(actions);

  editor.appendChild(head);

  // Color toolbar
  const ct = el('div', { class: 'color-toolbar' });
  ct.appendChild(el('span', { class: 'ct-label', text: 'Insertar' }));
  ['g','c','y','r'].forEach((c, i) => {
    const labels = { g: 'yo', c: 'cliente', y: 'clave', r: 'objeción' };
    const tag = el('button', {
      class: 'ct-tag',
      data: { c },
      onclick: () => wrapSelection(c)
    },
      el('span', { class: 'dot' }),
      el('span', { text: labels[c] }),
      el('span', { class: 'kbd', text: `⌘${i+1}` })
    );
    ct.appendChild(tag);
  });
  ct.appendChild(el('span', { class: 'ct-divider' }));
  const headingBtn = el('button', {
    class: 'ct-heading',
    onclick: () => insertHeading()
  },
    el('span', { class: 'hash', text: '#' }),
    el('span', { text: 'sección' }),
    el('span', { class: 'kbd', text: '⌘H' })
  );
  ct.appendChild(headingBtn);

  editor.appendChild(ct);

  // Body
  const body = el('div', { class: 'editor-body' });
  const textarea = el('textarea', {
    class: 'editor-textarea',
    id: 'editor-text',
    placeholder: '# Sección\n\n{g}Lo que digo yo{/g}\n\n{c}Lo que dice el cliente{/c}\n\n→ Punto clave en lista\n→ Otro punto\n\n---\n\n# Otra sección\n\n{y}Información clave{/y}\n\n{r}Objeción típica{/r}',
    spellcheck: false,
    value: script._content || '',
    oninput: e => {
      script._content = e.target.value;
      scheduleSave(script);
      updatePreview(script);
    }
  });
  body.appendChild(textarea);

  const preview = el('div', { class: 'editor-preview', id: 'editor-preview' });
  body.appendChild(preview);

  editor.appendChild(body);

  // Initial preview
  setTimeout(() => updatePreview(script), 0);

  return editor;
}

function updatePreview(script) {
  const preview = $('#editor-preview');
  if (!preview) return;
  const { html } = renderScriptHtml(script._content || '');
  preview.innerHTML = `<div class="reading-content" style="font-size:15px">${html || '<p style="color:var(--text-mute)">vista previa</p>'}</div>`;
}

function wrapSelection(c) {
  const ta = $('#editor-text');
  if (!ta) return;
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const before = ta.value.slice(0, start);
  const sel = ta.value.slice(start, end);
  const after = ta.value.slice(end);
  const wrapped = `{${c}}${sel || ''}{/${c}}`;
  ta.value = before + wrapped + after;
  // Place cursor inside if no selection, otherwise select inside
  if (sel) {
    ta.selectionStart = start + 3;
    ta.selectionEnd = start + 3 + sel.length;
  } else {
    const pos = start + 3;
    ta.selectionStart = ta.selectionEnd = pos;
  }
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

function insertHeading() {
  const ta = $('#editor-text');
  if (!ta) return;
  const start = ta.selectionStart;
  const before = ta.value.slice(0, start);
  const after = ta.value.slice(start);
  // Ensure newline boundaries
  const prefix = (before === '' || before.endsWith('\n\n')) ? '' : (before.endsWith('\n') ? '\n' : '\n\n');
  const suffix = after.startsWith('\n') ? '\n' : '\n\n';
  const insertion = prefix + '# ' + suffix;
  ta.value = before + insertion + after;
  const pos = start + prefix.length + 2;
  ta.selectionStart = ta.selectionEnd = pos;
  ta.focus();
  ta.dispatchEvent(new Event('input'));
}

let _saveTimer = null;
function scheduleSave(script) {
  if (_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    try {
      const encContent = await encryptWith(script._content || '', state.master);
      const now = Date.now();
      await api.updateScript(script.slug, { tn: script.tn || '', p: encContent, up: now });
      script.up = now;
      // Update sidebar timestamps
      $$('.sb-item').forEach(it => {
        const t = it.querySelector('.sb-item-title');
        if (t && t.textContent === (script.tn || '(sin título)')) {
          const s = it.querySelector('.sb-item-slug');
          if (s) s.textContent = relTime(now);
        }
      });
      const meta = $('.editor-meta');
      if (meta) meta.textContent = relTime(now);
    } catch (e) {
      toast('Error al guardar');
      console.error(e);
    }
  }, 600);
}

async function createNewScript() {
  if (state.mode !== 'workspace') {
    location.hash = '';
    setTimeout(createNewScript, 100);
    return;
  }
  // Generate unique slug
  let base = 'script';
  let n = 1;
  while (state.scripts.find(s => s.slug === `${base}-${n}`)) n++;
  const slug = `${base}-${n}`;
  const now = Date.now();
  try {
    const encContent = await encryptWith('', state.master);
    await api.createScript({ slug, tn: '', p: encContent, cr: now, up: now });
    const script = { slug, tn: '', p: encContent, s: null, cr: now, up: now, _content: '' };
    state.scripts.unshift(script);
    state.currentSlug = slug;
    renderWorkspace();
    setTimeout(() => { const t = $('.editor-title'); if (t) t.focus(); }, 50);
  } catch (e) {
    toast('Error al crear');
    console.error(e);
  }
}

async function confirmDelete() {
  if (!state.currentSlug) return;
  const script = state.scripts.find(s => s.slug === state.currentSlug);
  if (!script) return;
  if (!confirm(`¿Borrar "${script.tn || script.slug}"? No se puede deshacer.`)) return;
  try {
    await api.deleteScript(script.slug);
    state.scripts = state.scripts.filter(s => s.slug !== script.slug);
    state.currentSlug = (state.scripts[0] && state.scripts[0].slug) || null;
    renderWorkspace();
    toast('Borrado');
  } catch (e) {
    toast('Error al borrar');
  }
}

/* ═════════════════════════════════════════════════════════════
   SHARE MODAL
   ═════════════════════════════════════════════════════════════ */
function openShareModal() {
  const script = state.scripts.find(s => s.slug === state.currentSlug);
  if (!script) return;

  const modal = $('#modal');
  const content = $('#modal-content');
  content.innerHTML = '';

  const wrap = el('div');
  wrap.appendChild(el('div', { class: 'modal-head' },
    el('div', { class: 'modal-title', text: 'Compartir con enlace' }),
    el('div', { class: 'modal-sub', text: 'Generá una contraseña independiente solo para este script.' })
  ));

  const body = el('div', { class: 'modal-body' });

  const field = el('div', { class: 'field' },
    el('label', { class: 'field-label', text: 'Contraseña para el enlace' }),
    el('input', {
      class: 'field-input',
      type: 'text',
      id: 'share-pwd',
      autocomplete: 'off',
      placeholder: 'Mínimo 6 caracteres'
    })
  );
  body.appendChild(field);

  const result = el('div', { id: 'share-result', class: 'share-result hidden' });
  body.appendChild(result);

  wrap.appendChild(body);

  const foot = el('div', { class: 'modal-foot' },
    el('button', { class: 'btn btn-ghost', text: 'Cancelar', onclick: closeModal }),
    el('button', {
      class: 'btn btn-primary',
      text: 'Generar enlace',
      onclick: async () => {
        const pwd = $('#share-pwd').value;
        if (!pwd || pwd.length < 4) { toast('Contraseña muy corta (mínimo 4)'); return; }
        try {
          const payload = JSON.stringify({ content: script._content || '', title: script.tn || '' });
          const encShared = await encryptWith(payload, pwd);
          await api.updateScript(script.slug, { s: encShared, up: Date.now() });
          script.s = encShared;
          const url = `${location.origin}${location.pathname}#${script.slug}`;
          $('#share-result').innerHTML = '';
          $('#share-result').classList.remove('hidden');
          $('#share-result').appendChild(el('div', {},
            el('strong', { text: 'Enlace' }),
            el('div', { text: url, style: 'margin-top:4px' })
          ));
          $('#share-result').appendChild(el('div', {},
            el('strong', { text: 'Contraseña' }),
            el('div', { text: pwd, style: 'margin-top:4px' })
          ));
          try {
            await navigator.clipboard.writeText(`${url}\nContraseña: ${pwd}`);
            toast('Enlace y contraseña copiados');
          } catch (e) {}
        } catch (e) {
          toast('Error al generar');
          console.error(e);
        }
      }
    })
  );
  wrap.appendChild(foot);
  content.appendChild(wrap);
  modal.hidden = false;
  setTimeout(() => $('#share-pwd').focus(), 30);
}

function closeModal() { $('#modal').hidden = true; }

/* ═════════════════════════════════════════════════════════════
   READING MODE
   ═════════════════════════════════════════════════════════════ */
function renderReading(script) {
  state.mode = 'reading';
  const app = $('#app');
  app.innerHTML = '';

  const { html, flat, tree } = renderScriptHtml(script._content || '');
  state._flat = flat;
  state._tree = tree;

  // Determine initial current section (first non-empty titled one)
  const firstTitled = flat.find(s => s.title) || flat[0] || { title: '', idx: 0, color: SEC_COLORS[0] };

  // Top bar
  const bar = el('div', { class: 'reading-bar', id: 'reading-bar' });

  // Back button
  bar.appendChild(el('button', {
    class: 'rb-back',
    onclick: () => { location.hash = ''; },
    attrs: { title: 'Volver al workspace' },
    html: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 3L4 7l5 4"/></svg>'
  }));

  // Section nav — dominant
  const nav = el('div', { class: 'sec-nav', id: 'sec-nav' });
  const trigger = buildNavTrigger(firstTitled, script.tn);
  nav.appendChild(trigger);
  nav.appendChild(buildNavMenu(tree, flat, -1));
  bar.appendChild(nav);

  // Separator + controls
  bar.appendChild(el('div', { class: 'fontsize-control' },
    el('button', { onclick: () => changeFs(-1), attrs: { title: 'Reducir texto' }, text: 'A−' }),
    el('span', { class: 'sep' }),
    el('button', { onclick: () => changeFs(1), attrs: { title: 'Aumentar texto' }, text: 'A+' })
  ));

  bar.appendChild(el('button', {
    class: 'rb-back',
    onclick: openInScriptSearch,
    attrs: { title: 'Buscar en el script' },
    html: '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6" cy="6" r="3.5"/><path d="m9 9 3 3"/></svg>'
  }));

  // Progress bar
  bar.appendChild(el('div', { class: 'reading-progress', id: 'reading-progress', style: 'width:0%' }));

  app.appendChild(bar);

  // Body
  const body = el('div', { class: 'reading-body', id: 'reading-body' });
  body.style.setProperty('--reading-fs', state.fontSize + 'px');
  body.appendChild(el('div', { class: 'reading-content', id: 'reading-content', html }));
  body.addEventListener('scroll', updateReadingProgress);
  body.addEventListener('scroll', updateActiveSection);
  app.appendChild(body);
}

function buildNavTrigger(sec, scriptTitle) {
  const color = sec.color || SEC_COLORS[0];
  const label = sec.title || scriptTitle || 'Inicio';
  const trigger = el('button', {
    class: 'sec-nav-trigger',
    id: 'sec-nav-trigger',
    onclick: toggleSecNav
  },
    el('span', { class: 'sec-nav-dot', style: `background:${color}`, id: 'trigger-dot' }),
    el('span', { class: 'sec-nav-label', id: 'trigger-label', text: label }),
    el('span', { class: 'sec-nav-caret', html: '▾' })
  );
  return trigger;
}

function buildNavMenu(tree, flat, currentIdx) {
  const menu = el('div', { class: 'sec-nav-menu hidden', id: 'sec-nav-menu' });

  // First implicit section (before any heading, if not empty)
  const implicit = flat[0];
  if (implicit && !implicit.title && implicit.lines.some(l => l.type === 'text' || l.type === 'bullet')) {
    const group = el('div', { class: 'nav-group', style: `--nc:${SEC_COLORS[0]}` });
    const btn = el('button', {
      class: 'nav-h1-btn' + (currentIdx === implicit.idx ? ' nav-active' : ''),
      data: { idx: String(implicit.idx) },
      onclick: () => { jumpToSection(implicit.idx); closeSecNav(); }
    },
      el('span', { class: 'nav-h1-dot' }),
      el('span', { class: 'nav-h1-title', text: '(inicio)' })
    );
    group.appendChild(btn);
    menu.appendChild(group);
  }

  // Top-level sections with children
  for (const s of tree) {
    if (!s.title) continue;
    const group = el('div', { class: 'nav-group', style: `--nc:${s.color}` });
    const childCount = s.children ? s.children.length : 0;
    const h1Btn = el('button', {
      class: 'nav-h1-btn' + (currentIdx === s.idx ? ' nav-active' : ''),
      data: { idx: String(s.idx) },
      onclick: () => { jumpToSection(s.idx); closeSecNav(); }
    },
      el('span', { class: 'nav-h1-dot' }),
      el('span', { class: 'nav-h1-title', text: s.title }),
      childCount > 0 ? el('span', { class: 'nav-h1-count', text: String(childCount) }) : null
    );
    group.appendChild(h1Btn);

    if (s.children && s.children.length) {
      const children = el('div', { class: 'nav-children' });
      for (const ch of s.children) {
        const h2Btn = el('button', {
          class: 'nav-h2-btn' + (currentIdx === ch.idx ? ' nav-active' : ''),
          data: { idx: String(ch.idx) },
          onclick: () => { jumpToSection(ch.idx); closeSecNav(); }
        },
          el('span', { class: 'nav-h2-mark', text: '—' }),
          el('span', { text: ch.title })
        );
        children.appendChild(h2Btn);
      }
      group.appendChild(children);
    }

    menu.appendChild(group);
  }

  return menu;
}

function toggleSecNav() {
  const trigger = $('#sec-nav-trigger');
  const menu = $('#sec-nav-menu');
  if (!trigger || !menu) return;
  const isOpen = !menu.classList.contains('hidden');
  if (isOpen) {
    closeSecNav();
  } else {
    menu.classList.remove('hidden');
    trigger.classList.add('open');
    setTimeout(() => {
      const onDoc = (e) => {
        if (!e.target.closest('#sec-nav')) {
          closeSecNav();
          document.removeEventListener('click', onDoc, true);
        }
      };
      document.addEventListener('click', onDoc, true);
    }, 0);
  }
}

function closeSecNav() {
  $('#sec-nav-menu')?.classList.add('hidden');
  $('#sec-nav-trigger')?.classList.remove('open');
}

function jumpToSection(idx) {
  closeSecNav();
  const flat = state._flat || [];
  const sec = flat.find(s => s.idx === idx);
  if (!sec) return;
  const body = $('#reading-body');
  if (!body) return;
  if (idx === 0 && !sec.title) {
    body.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    const h = document.getElementById('sec-' + idx);
    if (h) body.scrollTo({ top: h.offsetTop - 16, behavior: 'smooth' });
  }
  updateTriggerLabel(sec);
}

function updateTriggerLabel(sec) {
  const dot = $('#trigger-dot');
  const label = $('#trigger-label');
  if (dot) dot.style.background = sec.color || 'var(--text-faint)';
  if (label) label.textContent = sec.title || '(inicio)';
  // Update active states in menu
  $$('.nav-h1-btn, .nav-h2-btn').forEach(btn => {
    const active = btn.dataset.idx === String(sec.idx);
    btn.classList.toggle('nav-active', active);
  });
}

function changeFs(delta) {
  state.fontSize = Math.max(12, Math.min(24, state.fontSize + delta));
  localStorage.setItem('fs', String(state.fontSize));
  const body = $('#reading-body');
  if (body) body.style.setProperty('--reading-fs', state.fontSize + 'px');
}

function updateReadingProgress() {
  const body = $('#reading-body');
  if (!body) return;
  const max = body.scrollHeight - body.clientHeight;
  const pct = max > 0 ? (body.scrollTop / max) * 100 : 0;
  const bar = $('#reading-progress');
  if (bar) bar.style.width = Math.min(100, pct) + '%';
}

function updateActiveSection() {
  const body = $('#reading-body');
  if (!body) return;
  const flat = state._flat || [];
  const scrollTop = body.scrollTop;
  let current = flat[0] || { title: '', idx: 0, color: SEC_COLORS[0] };
  for (const s of flat) {
    const h = document.getElementById('sec-' + s.idx);
    if (h && h.offsetTop - 70 <= scrollTop) current = s;
  }
  updateTriggerLabel(current);
}

function openInScriptSearch() {
  const bar = $('#reading-bar');
  if (!bar) return;
  const existing = $('.reading-search');
  if (existing) { existing.remove(); return; }

  const overlay = el('div', { class: 'reading-search' });
  const input = el('input', {
    type: 'text',
    placeholder: 'Buscar...',
    oninput: e => doInScriptSearch(e.target.value),
    onkeydown: e => { if (e.key === 'Escape') closeInScriptSearch(); }
  });
  overlay.appendChild(input);
  overlay.appendChild(el('span', { class: 'reading-search-count', text: '' }));
  overlay.appendChild(el('button', { class: 'rb-back', onclick: closeInScriptSearch, text: '✕' }));
  bar.appendChild(overlay);
  setTimeout(() => input.focus(), 30);
}

function closeInScriptSearch() {
  const o = $('.reading-search');
  if (o) o.remove();
  doInScriptSearch('');
}

function doInScriptSearch(q) {
  const script = state.scripts.find(s => s.slug === state.currentSlug)
    || state._sharedScript;
  if (!script) return;
  state.searchInScript.query = q;
  state.searchInScript.count = 0;
  const { html } = renderScriptHtml(script._content || '', q);
  const content = $('#reading-content');
  if (content) content.innerHTML = html;
  const countEl = $('.reading-search-count');
  if (countEl) countEl.textContent = q ? String(state.searchInScript.count) : '';
  if (q) {
    const first = content && content.querySelector('mark');
    if (first) $('#reading-body')?.scrollTo({ top: first.offsetTop - 80, behavior: 'smooth' });
  }
}

/* ═════════════════════════════════════════════════════════════
   SHARED MODE (single script via link)
   ═════════════════════════════════════════════════════════════ */
function renderShared(scriptData) {
  // Inject the shared script into a single-script reading view
  state.scripts = [{ ...scriptData, _content: scriptData._content, tn: scriptData._title || scriptData.tn }];
  state.currentSlug = scriptData.slug;
  // Hide actions that require master
  renderReading(state.scripts[0]);
  // Remove buttons that don't apply
  setTimeout(() => {
    // Replace back button to do nothing or close
    const back = $('.reading-bar .tb-btn');
    if (back) {
      back.onclick = () => toast('Modo compartido — sin acceso al workspace');
    }
  }, 50);
}

/* ═════════════════════════════════════════════════════════════
   LOCK / UNLOCK
   ═════════════════════════════════════════════════════════════ */
function lockApp() {
  state.master = null;
  state.scripts = [];
  state.currentSlug = null;
  location.hash = '';
  renderLock({ hasHash: true });
}

function openScript(slug) {
  location.hash = slug;
}

/* ═════════════════════════════════════════════════════════════
   KEYBOARD
   ═════════════════════════════════════════════════════════════ */
function onKey(e) {
  // ESC handling
  if (e.key === 'Escape') {
    if (state.palette.open) { closePalette(); return; }
    if (!$('#modal').hidden) { closeModal(); return; }
    if ($('.reading-search')) { closeInScriptSearch(); return; }
    if (state.scratchOpen) { toggleScratch(); return; }
    if (state.mode === 'reading') { location.hash = ''; return; }
  }

  // Don't intercept when typing in inputs (mostly)
  const inInput = e.target.matches('input, textarea, [contenteditable]');

  // Palette navigation
  if (state.palette.open) {
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      let i = state.palette.selected + 1;
      while (i < state.palette.items.length && state.palette.items[i].section) i++;
      if (i < state.palette.items.length) { state.palette.selected = i; renderPalette(); }
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      let i = state.palette.selected - 1;
      while (i >= 0 && state.palette.items[i].section) i--;
      if (i >= 0) { state.palette.selected = i; renderPalette(); }
      return;
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      activatePaletteItem(state.palette.selected);
      return;
    }
    return;
  }

  // Global shortcuts
  const mod = e.metaKey || e.ctrlKey;

  if (!inInput && (e.key === '/' || (mod && e.key.toLowerCase() === 'k'))) {
    e.preventDefault();
    openPalette();
    return;
  }
  if (mod && e.key.toLowerCase() === 'k') { e.preventDefault(); openPalette(); return; }

  if (mod && e.key.toLowerCase() === 'n') { e.preventDefault(); createNewScript(); return; }
  if (mod && e.key.toLowerCase() === 'l') { e.preventDefault(); lockApp(); return; }
  if (mod && e.key === '.') { e.preventDefault(); toggleScratch(); return; }
  if (mod && e.key.toLowerCase() === 'r' && state.currentSlug) { e.preventDefault(); location.hash = state.currentSlug; return; }
  if (mod && e.key.toLowerCase() === 'h' && state.mode === 'workspace') { e.preventDefault(); insertHeading(); return; }

  // In editor: ⌘1-4 to wrap with tag
  if (state.mode === 'workspace' && mod && ['1','2','3','4'].includes(e.key)) {
    e.preventDefault();
    wrapSelection(['g','c','y','r'][parseInt(e.key) - 1]);
    return;
  }

  // In reading: f to search
  if (state.mode === 'reading' && !inInput && e.key === 'f') {
    e.preventDefault();
    openInScriptSearch();
    return;
  }
}

/* ═════════════════════════════════════════════════════════════
   ROUTING
   ═════════════════════════════════════════════════════════════ */
async function handleRoute() {
  const hash = location.hash.replace(/^#/, '');

  if (state.mode === 'locked' || state.mode === 'init') {
    // Check what to show
    if (hash) {
      // Shared link or normal — check if there's a master config
      try {
        const stored = await api.getConfig('master_hash');
        if (stored) {
          // Could be shared. Try shared first.
          // But user might also be the owner. Show shared lock by default.
          renderLock({ shared: true, slug: hash });
          return;
        } else {
          // No master configured yet
          renderLock({ hasHash: false });
          return;
        }
      } catch (e) {
        renderLock({ error: 'Sin conexión — proyecto Supabase puede estar pausado', hasHash: true });
        return;
      }
    }
    try {
      const stored = await api.getConfig('master_hash');
      renderLock({ hasHash: !!stored });
    } catch (e) {
      renderLock({ error: 'Sin conexión — proyecto Supabase puede estar pausado', hasHash: true });
    }
    return;
  }

  if (state.mode === 'shared') {
    // Already in shared mode — re-render if needed
    if (hash !== state.currentSlug) {
      // Different shared link — go back to lock
      lockApp();
      return;
    }
    renderShared(state._sharedScript);
    return;
  }

  // Workspace / reading
  renderApp();
}

/* ═════════════════════════════════════════════════════════════
   INIT
   ═════════════════════════════════════════════════════════════ */
async function init() {
  document.addEventListener('keydown', onKey);
  initScratch();
  // Modal close
  $('#modal').addEventListener('click', e => {
    if (e.target.dataset.close !== undefined) closeModal();
  });
  $('#palette').addEventListener('click', e => {
    if (e.target.dataset.close !== undefined) closePalette();
  });
  $('#palette-input').addEventListener('input', e => paletteSearch(e.target.value));

  // Hash change
  window.addEventListener('hashchange', handleRoute);

  state.mode = 'init';
  await handleRoute();
}

window.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
